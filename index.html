<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Global Currency Converter</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="logo.jpg">

<style>
:root {
--bg:#f2f2f7;
--card:#ffffff;
--text:#000000;
--label:#8e8e93;
--input-bg:#f2f2f7;
--primary:#007aff;
}

@media(prefers-color-scheme: dark){
:root{
--bg:#000000;
--card:#1c1c1e;
--text:#ffffff;
--label:#8e8e93;
--input-bg:#2c2c2e;
}
}

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:var(--bg);
margin:0;
padding:0;
display:flex;
flex-direction:column;
height:100vh;
overscroll-behavior:none;
overflow:hidden;
}

.top-info{
padding:40px 25px 10px 25px;
display: flex;
flex-direction: column;
}

h2{
font-size:26px;
margin:0;
font-weight:800;
letter-spacing:-1px;
color:var(--text);
}

.guide-text{
font-size:13px;
color:var(--label);
font-weight:500;
line-height:1.5;
margin-top:8px;
}

.bottom-area{
margin-top:auto;
display:flex;
flex-direction:column;
}

.base-selector-wrapper{
display:flex;
justify-content:flex-end;
padding:0 25px 12px 0;
}

select#base-select{
padding:8px 14px;
border-radius:12px;
border:none;
background:rgba(0,0,0,0.05);
color:var(--text);
font-weight:700;
font-size:13px;
outline:none;
appearance:none;
cursor:pointer;
}

@media(prefers-color-scheme: dark){
select#base-select{
background:rgba(255,255,255,0.1);
}
}

.container-card{
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
background:var(--card);
border-top-left-radius:30px;
border-top-right-radius:30px;
box-shadow:0 -10px 30px rgba(0,0,0,0.08);
padding-bottom:env(safe-area-inset-bottom,20px);
max-height:70vh;
}

#inputs{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
max-height:45vh;
overflow-y:auto;
padding:2px;
-webkit-overflow-scrolling:touch;
}

.input-group{
background:var(--input-bg);
padding:8px 12px;
border-radius:14px;
border:2px solid transparent;
transition:all .3s cubic-bezier(.25,1,.5,1);
}

.input-group:focus-within{
border-color:var(--primary);
background:var(--card);
box-shadow:0 4px 12px rgba(0,0,0,.08);
transform:translateY(-1px);
}

label{
display:block;
margin-bottom:2px;
font-size:9px;
font-weight:700;
color:var(--label);
}

input{
width:100%;
border:none;
background:transparent;
font-size:18px;
font-weight:700;
color:var(--text);
outline:none;
padding:0;
}

.tip-container{
display:flex;
gap:8px;
margin-top:5px;
}

.tip-btn{
flex:1;
padding:16px;
border:none;
border-radius:16px;
background:var(--primary);
color:white;
font-weight:700;
font-size:13px;
cursor:pointer;
transition: transform 0.1s;
}

.tip-btn:active {
transform: scale(0.96);
opacity: 0.9;
}

.status{
font-size:10px;
text-align:center;
color:var(--label);
font-weight:600;
padding-top:8px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="top-info">
<h2>🌏 세계여행 환율 계산기</h2>
<div class="guide-text">
기준 통화를 선택 후 금액을 입력하고,<br>
하단 버튼으로 빠르게 팁을 추가해 보세요.
<span class="disclaimer">
※ 본 계산기는 여행 편의를 위해 제작되었습니다.<br>
미세한 오차가 있을 수 있으니 참고용으로만 사용해 주세요!
</span>
</div>
</div>

<div class="bottom-area">
<div class="base-selector-wrapper">
<select id="base-select" onchange="changeBase(this.value)">
<option value="KRW">기준 통화: KRW</option>
<option value="USD">기준 통화: USD</option>
<option value="EUR">기준 통화: EUR</option>
<option value="JPY">기준 통화: JPY</option>
</select>
</div>

<div class="container-card">
<div id="inputs"></div>
<div class="tip-container">
<button class="tip-btn" onclick="applyTip(1.1)">+팁 10%</button>
<button class="tip-btn" onclick="applyTip(1.15)">+팁 15%</button>
<button class="tip-btn" onclick="applyTip(1.2)">+팁 20%</button>
</div>
<div class="status" id="last-update">Updating...</div>
</div>
</div>

<script>
const currencies=[
{code:'KRW',name:'KR 🇰🇷'},
{code:'JPY',name:'JP 🇯🇵'},
{code:'USD',name:'US 🇺🇸'},
{code:'EUR',name:'EU 🇪🇺'},
{code:'THB',name:'TH 🇹🇭'},
{code:'VND',name:'VN 🇻🇳'},
{code:'CNY',name:'CN 🇨🇳'},
{code:'PHP',name:'PH 🇵🇭'},
{code:'TWD',name:'TW 🇹🇼'},
{code:'HKD',name:'HK 🇭🇰'},
{code:'SGD',name:'SG 🇸🇬'},
{code:'TRY',name:'TR 🇹🇷'},
{code:'CZK',name:'CZ 🇨🇿'},
{code:'HUF',name:'HU 🇭🇺'}
];

let rates={};
let lastFocusedId='KRW';
let baseCurrency=localStorage.getItem('baseCurrency')||'KRW';

document.getElementById('base-select').value=baseCurrency;

function renderInputs(){
const container=document.getElementById('inputs');
container.innerHTML='';
currencies.forEach(cur=>{
const group=document.createElement('div');
group.className='input-group';
group.innerHTML=`
<label>${cur.code} (${cur.name})</label>
<input type="text"
inputmode="decimal"
id="${cur.code}"
placeholder="0"
oninput="handleInput('${cur.code}')"
onfocus="lastFocusedId='${cur.code}'; setTimeout(()=>event.target.select(),50)"
onclick="this.select()">
`;
container.appendChild(group);
});
}

async function fetchRates(){
const CACHE_KEY=`rates_${baseCurrency}`;
const TIME_KEY=`rates_time_${baseCurrency}`;
const TWELVE_HOURS=12*60*60*1000;
const now=Date.now();
const lastFetch=localStorage.getItem(TIME_KEY);

if(lastFetch && now-lastFetch < TWELVE_HOURS){
const cached=localStorage.getItem(CACHE_KEY);
if(cached){
rates=JSON.parse(cached);
document.getElementById('last-update').innerText=
`🟡 Cached Rate (${new Date(parseInt(lastFetch)).toLocaleTimeString()})`;
renderInputs();
return;
}
}

try{
const res=await fetch(`https://open.er-api.com/v6/latest/${baseCurrency}`);
const data=await res.json();
if(data.result==="success"){
rates=data.rates;
localStorage.setItem(CACHE_KEY,JSON.stringify(rates));
localStorage.setItem(TIME_KEY,now);
document.getElementById('last-update').innerText=
`✅ Updated: ${new Date().toLocaleTimeString()}`;
}
}catch(e){
const cached=localStorage.getItem(CACHE_KEY);
if(cached){
rates=JSON.parse(cached);
document.getElementById('last-update').innerText="⚠️ Offline Cached";
}
}
renderInputs();
}

async function changeBase(newBase){
baseCurrency=newBase;
localStorage.setItem('baseCurrency',newBase);
await fetchRates();
const currentInput=document.getElementById(lastFocusedId);
if(currentInput){
updateAll(
lastFocusedId,
parseFloat(currentInput.value.replace(/,/g,''))||0
);
}
}

function formatCurrency(code,value){
if(value===0) return '';
const noDecimal=['KRW','JPY','VND','HUF','IDR'];
return Number(value).toLocaleString(undefined,{
minimumFractionDigits:0,
maximumFractionDigits:noDecimal.includes(code)?0:2
});
}

function handleInput(code){
const el=document.getElementById(code);
let val=el.value.replace(/,/g,'');
if(val===''||isNaN(val)){
updateAll(code,0);
return;
}
updateAll(code,parseFloat(val));
}

function updateAll(changedCode,val){
if(!rates[changedCode]) return;
const baseVal=val/rates[changedCode];
currencies.forEach(c=>{
const targetEl=document.getElementById(c.code);
if(targetEl && c.code!==changedCode){
const result=baseVal*rates[c.code];
targetEl.value=formatCurrency(c.code,result);
}
});
}

function applyTip(ratio){
const el=document.getElementById(lastFocusedId);
let val=parseFloat(el.value.replace(/,/g,''));
if(!isNaN(val)){
const tipped=val*ratio;
el.value=formatCurrency(lastFocusedId,tipped);
updateAll(lastFocusedId,tipped);
}
}

fetchRates();
</script>
</body>
</html>
